global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: teleport-prod

rule_files:
  - /etc/prometheus/rules/teleport-alert-rules.yml

scrape_configs:
  - job_name: teleport
    scheme: http
    metrics_path: /metrics
    static_configs:
      - targets:
          - teleport-1:3000
          - teleport-2:3000
          - teleport-3:3000
        labels:
          service: teleport
