version: '3.9'

x-teleport-common: &teleport-common
  image: ${TELEPORT_IMAGE}
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
  env_file:
    - .env
  environment:
    TELEPORT_CONFIG_FILE: /etc/teleport/teleport.yaml
    AWS_ACCESS_KEY_ID: ${SESSION_STORAGE_ACCESS_KEY}
    AWS_SECRET_ACCESS_KEY: ${SESSION_STORAGE_SECRET_KEY}
    AWS_REGION: ${SESSION_STORAGE_REGION}
    AWS_ENDPOINT_URL: ${SESSION_STORAGE_ENDPOINT}
    AWS_ENDPOINT_URL_S3: ${SESSION_STORAGE_ENDPOINT}
  command:
    - teleport
    - start
    - --config=/etc/teleport/teleport.yaml
  networks:
    - teleport-backend
  volumes:
    - ./runtime/teleport.yaml:/etc/teleport/teleport.yaml:ro
    - ./teleport/dynamic:/etc/teleport/dynamic:ro
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/readyz >/dev/null 2>&1 || exit 1"]
    interval: 15s
    timeout: 5s
    retries: 8
    start_period: 45s

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - max_connections=600
      - -c
      - shared_buffers=4GB
      - -c
      - effective_cache_size=12GB
      - -c
      - maintenance_work_mem=1GB
      - -c
      - wal_buffers=64MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - log_min_duration_statement=1500
    volumes:
      - teleport_postgres_data:/var/lib/postgresql/data
    networks:
      - teleport-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  teleport-1:
    <<: *teleport-common
    hostname: teleport-1
    volumes:
      - ./runtime/teleport.yaml:/etc/teleport/teleport.yaml:ro
      - ./teleport/dynamic:/etc/teleport/dynamic:ro
      - teleport_node_1:/var/lib/teleport

  teleport-2:
    <<: *teleport-common
    hostname: teleport-2
    volumes:
      - ./runtime/teleport.yaml:/etc/teleport/teleport.yaml:ro
      - ./teleport/dynamic:/etc/teleport/dynamic:ro
      - teleport_node_2:/var/lib/teleport

  teleport-3:
    <<: *teleport-common
    hostname: teleport-3
    volumes:
      - ./runtime/teleport.yaml:/etc/teleport/teleport.yaml:ro
      - ./teleport/dynamic:/etc/teleport/dynamic:ro
      - teleport_node_3:/var/lib/teleport

  nginx:
    image: ${NGINX_IMAGE}
    restart: unless-stopped
    depends_on:
      teleport-1:
        condition: service_healthy
      teleport-2:
        condition: service_healthy
      teleport-3:
        condition: service_healthy
    ports:
      - "${WEB_LISTEN_PORT}:${WEB_LISTEN_PORT}"
      - "${SSH_LISTEN_PORT}:${SSH_LISTEN_PORT}"
      - "${TUNNEL_LISTEN_PORT}:${TUNNEL_LISTEN_PORT}"
    networks:
      - teleport-backend
    volumes:
      - ./runtime/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${TLS_CERT_PATH}:/etc/nginx/tls/tls.crt:ro
      - ${TLS_KEY_PATH}:/etc/nginx/tls/tls.key:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  teleport-backend:
    name: teleport-backend

volumes:
  teleport_postgres_data:
    labels:
      backup.scope: daily
      backup.component: postgres
  teleport_node_1:
    labels:
      backup.scope: daily
      backup.component: teleport
  teleport_node_2:
    labels:
      backup.scope: daily
      backup.component: teleport
  teleport_node_3:
    labels:
      backup.scope: daily
      backup.component: teleport
