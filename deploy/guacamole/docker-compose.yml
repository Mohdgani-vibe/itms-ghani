version: '3.8'

# Apache Guacamole - Clientless Remote Desktop Gateway
# Provides browser-based RDP, VNC, and SSH access to endpoints
#
# Services:
#   - guacd: Core proxy daemon (handles RDP/VNC/SSH protocols)
#   - guacamole: Web application (REST API + web interface)
#   - postgres: Database for connection storage
#
# Ports:
#   - 8080: Guacamole web interface (proxy via nginx)
#   - 4822: guacd internal port
#
# Integration with ITMS:
#   - ITMS backend proxies requests to http://guacamole:8080
#   - Nginx route: /remote/* -> guacamole:8080/guacamole/*
#   - Frontend: DeviceDetailPage "Remote Desktop" button
#
# Usage:
#   docker-compose -f deploy/guacamole/docker-compose.yml up -d
#   Default credentials: guacadmin / guacadmin (CHANGE IMMEDIATELY)
#
# Documentation: https://guacamole.apache.org/doc/gug/

services:
  # PostgreSQL database for Guacamole
  postgres:
    image: postgres:15-alpine
    container_name: itms-guacamole-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-changeme_guacamole_db_password}
    volumes:
      - guacamole-db:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    networks:
      - guacamole-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guacamole_user -d guacamole_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Guacamole daemon (protocol handler)
  guacd:
    image: guacamole/guacd:1.5.4
    container_name: itms-guacd
    restart: unless-stopped
    networks:
      - guacamole-network
    volumes:
      - guacd-drive:/drive
      - guacd-record:/record
    environment:
      # Enable recording for audit trail
      GUACD_LOG_LEVEL: info
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep 4822 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Guacamole web application
  guacamole:
    image: guacamole/guacamole:1.5.4
    container_name: itms-guacamole
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      guacd:
        condition: service_healthy
    ports:
      - "8080:8080"  # Expose for nginx proxy
    networks:
      - guacamole-network
    environment:
      # Database configuration
      POSTGRES_HOSTNAME: postgres
      POSTGRES_DATABASE: guacamole_db
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-changeme_guacamole_db_password}
      
      # guacd connection
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      
      # Optional: LDAP/SAML integration (for future SSO)
      # LDAP_HOSTNAME: ldap.example.com
      # LDAP_PORT: 389
      
      # Recording storage (optional)
      RECORDING_SEARCH_PATH: /record
      
      # Extension options
      EXTENSION_PRIORITY: postgresql
      
      # API configuration
      # Allow ITMS backend to create connections programmatically
      GUACAMOLE_HOME: /etc/guacamole
      
    volumes:
      - guacamole-home:/etc/guacamole
      - guacd-drive:/drive
      - guacd-record:/record
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/guacamole/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  guacamole-db:
    driver: local
    name: itms-guacamole-db
  guacd-drive:
    driver: local
    name: itms-guacd-drive
  guacd-record:
    driver: local
    name: itms-guacd-record
  guacamole-home:
    driver: local
    name: itms-guacamole-home

networks:
  guacamole-network:
    driver: bridge
    name: itms-guacamole-network

# Database initialization:
# 1. Generate init script:
#    docker run --rm guacamole/guacamole:1.5.4 /opt/guacamole/bin/initdb.sh --postgres > deploy/guacamole/init/001-init-db.sql
#
# 2. Start services:
#    docker-compose -f deploy/guacamole/docker-compose.yml up -d
#
# 3. Access web interface:
#    http://YOUR_SERVER_IP:8080/guacamole
#    Default: guacadmin / guacadmin
#
# 4. Change default password immediately!
#
# ITMS Integration Steps:
# 1. Add nginx proxy in deploy/nginx/itms.conf:
#      location /remote/ {
#        proxy_pass http://localhost:8080/guacamole/;
#      }
#
# 2. Backend creates connections via Guacamole API:
#    POST http://guacamole:8080/guacamole/api/session/data/postgresql/connections
#
# 3. Frontend DeviceDetailPage "Remote Desktop" button:
#    Opens iframe or new tab: /remote/#/client/{connection_id}
#
# Security Notes:
# - Change GUACAMOLE_DB_PASSWORD in .env
# - Change default guacadmin password on first login
# - Enable TOTP MFA for admin users
# - Restrict network access to ITMS server only
# - Enable session recording for audit compliance
# - Use HTTPS in production (nginx handles SSL termination)
