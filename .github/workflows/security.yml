name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better detection

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency Security
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Go Dependencies
            path: ./backend
            language: go
          - name: Node.js Dependencies
            path: ./frontend
            language: javascript
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ matrix.path }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  docker-scan:
    name: Docker Image Security
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd backend
          docker build -t itms-backend:${{ github.sha }} .

      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'itms-backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-docker.sarif'

      - name: Upload Docker scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-docker.sarif'

  custom-credential-check:
    name: Custom Credential Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for .env files
        run: |
          if git ls-files | grep -E '\\.env$|secrets/.*\\.txt$'; then
            echo "❌ ERROR: .env files or secrets found in repository!"
            exit 1
          fi
          echo "✅ No .env files found in repository"

      - name: Check for database connection strings
        run: |
          if git grep -E "(postgres|mysql|mongodb)://[^:]+:[^@]+@" -- ':!*.md' ':!*.yml'; then
            echo "❌ ERROR: Database connection strings with credentials found!"
            exit 1
          fi
          echo "✅ No hardcoded database credentials found"

      - name: Check for API keys
        run: |
          if git grep -iE "(api[_-]?key|secret[_-]?key|access[_-]?token)\s*=\s*['\"][^'\"]{20,}" -- ':!*.md' ':!*.example'; then
            echo "❌ ERROR: Potential API keys or secrets found!"
            exit 1
          fi
          echo "✅ No hardcoded API keys found"

      - name: Check for private keys
        run: |
          if git grep -E "BEGIN (RSA |OPENSSH )?PRIVATE KEY" -- ':!*.md'; then
            echo "❌ ERROR: Private keys found in repository!"
            exit 1
          fi
          echo "✅ No private keys found"

  code-quality:
    name: Code Quality & SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run gosec (Go security scanner)
        run: |
          cd backend
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt=sarif -out=gosec-results.sarif ./...
        continue-on-error: true

      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: backend/gosec-results.sarif

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan, custom-credential-check]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Secret Detection: Completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dependency Scan: Completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Custom Checks: Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the Security tab for detailed findings." >> $GITHUB_STEP_SUMMARY
