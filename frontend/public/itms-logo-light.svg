<svg width="800" height="320" viewBox="0 0 800 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="320" fill="white"/>
  
  <!-- Server icon with gradient -->
  <g transform="translate(80, 80)">
    <defs>
      <linearGradient id="serverGradientLight" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#3A8FDE;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#2563B8;stop-opacity:1" />
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="140" height="160" rx="24" fill="url(#serverGradientLight)"/>
    
    <!-- Server layers -->
    <rect x="18" y="20" width="104" height="20" rx="5" fill="#FFFFFF"/>
    <rect x="18" y="50" width="104" height="20" rx="5" fill="#A8D5F5"/>
    <rect x="18" y="80" width="80" height="20" rx="5" fill="#7DBEE8"/>
    
    <!-- Bottom server boxes -->
    <rect x="18" y="115" width="44" height="26" rx="6" fill="#5A9FD4"/>
    <rect x="78" y="115" width="44" height="26" rx="6" fill="#5A9FD4"/>
    
    <!-- Indicator dots -->
    <circle cx="28" cy="60" r="3.5" fill="#2563B8"/>
    <circle cx="40" cy="60" r="3.5" fill="#2563B8"/>
    <circle cx="28" cy="90" r="3.5" fill="#2563B8"/>
    
    <!-- Z badge -->
    <circle cx="115" cy="135" r="28" fill="white" stroke="#2563B8" stroke-width="4"/>
    <text x="115" y="150" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2563B8" text-anchor="middle">Z</text>
  </g>
  
  <!-- ITMS text -->
  <text x="260" y="200" font-family="Arial, sans-serif" font-size="140" font-weight="900" fill="#1a1a1a" letter-spacing="-3">ITMS</text>
  
  <!-- Blue line -->
  <line x1="260" y1="218" x2="750" y2="218" stroke="#2563B8" stroke-width="7" stroke-linecap="round"/>
  
  <!-- IT MANAGEMENT SYSTEM -->
  <text x="260" y="252" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="#2563B8" letter-spacing="10">IT MANAGEMENT SYSTEM</text>
  
  <!-- POWERED BY ZERODHA -->
  <text x="260" y="285" font-family="Arial, sans-serif" font-size="19" font-weight="400" fill="#9CA3AF" letter-spacing="1">POWERED BY </text>
  <text x="408" y="285" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#2563B8" letter-spacing="1">ZERODHA</text>
</svg>
