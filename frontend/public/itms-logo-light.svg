<svg width="690" height="290" viewBox="0 0 690 290" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ITMS Light Logo with Z</title>
  <desc>ITMS IT Management System light logo with Zerodha Z</desc>

  <!-- Background -->
  <rect x="0" y="0" width="680" height="280" fill="#FFFFFF"/>

  <!-- Server icon container -->
  <rect x="100" y="60" width="155" height="155" rx="28" fill="#387ED1"/>

  <!-- Server lines -->
  <rect x="122" y="90" width="111" height="14" rx="5" fill="white"/>
  <rect x="122" y="113" width="50" height="12" rx="4" fill="white" fill-opacity="0.75"/>
  <rect x="180" y="113" width="50" height="12" rx="4" fill="white" fill-opacity="0.75"/>
  <rect x="122" y="134" width="62" height="10" rx="3" fill="white" fill-opacity="0.45"/>
  <rect x="192" y="134" width="38" height="10" rx="3" fill="white" fill-opacity="0.45"/>

  <!-- Status indicators -->
  <circle cx="132" cy="185" r="6" fill="white" fill-opacity="0.9"/>
  <circle cx="150" cy="185" r="6" fill="white" fill-opacity="0.45"/>
  <circle cx="168" cy="185" r="6" fill="white" fill-opacity="0.2"/>

  <!-- Z badge -->
  <rect x="208" y="168" width="52" height="52" rx="12" fill="#FFFFFF" stroke="#387ED1" stroke-width="2"/>
  <text x="234" y="204" font-family="'Arial Black', Arial, sans-serif" font-size="28" font-weight="900" fill="#387ED1" text-anchor="middle">Z</text>

  <!-- ITMS text -->
  <text x="282" y="158" font-family="'Arial Black', Arial, sans-serif" font-size="68" font-weight="900" fill="#1A1F2E" letter-spacing="6">ITMS</text>

  <!-- Underline -->
  <rect x="282" y="168" width="300" height="4" rx="2" fill="#387ED1"/>

  <!-- Subtitle -->
  <text x="282" y="190" font-family="Arial, sans-serif" font-size="12" fill="#64748B" letter-spacing="4">IT MANAGEMENT SYSTEM</text>

  <!-- Zerodha text -->
  <text x="282" y="215" font-family="'Arial Black', Arial, sans-serif" font-size="13" font-weight="900" fill="#387ED1" letter-spacing="2">ZERODHA</text>

</svg>
